<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NLM Enhancer - 视频处理中</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Google Sans', -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 520px;
      width: 90%;
      text-align: center;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 8px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 40px;
    }

    /* === 阶段状态区 === */
    .status-card {
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 16px;
      padding: 32px 28px;
      margin-bottom: 20px;
      backdrop-filter: blur(12px);
    }

    .status-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .status-text {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .status-detail {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    /* === 进度条 === */
    .progress-bar-outer {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-bar-inner {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 12px;
      color: #64748b;
      font-variant-numeric: tabular-nums;
    }

    /* === 警告提示 === */
    .warning-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(234, 179, 8, 0.08);
      border: 1px solid rgba(234, 179, 8, 0.2);
      border-radius: 10px;
      font-size: 13px;
      color: #fbbf24;
      margin-bottom: 20px;
    }

    .warning-banner .warn-icon { font-size: 18px; flex-shrink: 0; }

    /* === 处理选项摘要 === */
    .options-summary {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .opt-tag {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(99, 102, 241, 0.12);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    /* === 完成状态 === */
    .done-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: #cbd5e1;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover { background: rgba(255, 255, 255, 0.12); }

    /* === 错误状态 === */
    .error-card {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 16px;
      padding: 28px;
      display: none;
    }

    .error-card .status-icon { color: #ef4444; }

    .error-detail {
      font-size: 12px;
      color: #f87171;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 8px;
      margin-top: 12px;
      text-align: left;
      max-height: 120px;
      overflow-y: auto;
      word-break: break-all;
      font-family: monospace;
    }

    /* === 本地配置面板 === */
    .local-config-panel {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      text-align: left;
      display: none;
    }

    .config-title {
      font-size: 12px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    .opt-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    
    .opt-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      cursor: pointer;
    }

    .opt-info { display: flex; flex-direction: column; gap: 2px; }
    .opt-name { font-size: 14px; font-weight: 600; }
    .opt-desc { font-size: 11px; color: #64748b; }

    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #475569; border-radius: 11px; cursor: pointer; transition: 0.3s; }
    .slider::after { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
    .toggle input:checked + .slider { background: #6366f1; }
    .toggle input:checked + .slider::after { transform: translateX(18px); }

    .select-mode {
      width: 100%;
      padding: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #f1f5f9;
      font-size: 14px;
      outline: none;
    }

    .btn-big-pick {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
      transition: 0.2s;
    }
    .btn-big-pick:hover { transform: translateY(-2px); filter: brightness(1.1); }

    /* 隐藏辅助 */
    .hidden { display: none !important; }

    /* === 加载动画 === */
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎬</div>
    <h1 data-i18n="wmProcessTitle">NLM Enhancer · 视频处理</h1>
    <div class="subtitle" data-i18n="wmProcessSubtitle">请先配置处理参数，然后选择本地视频文件</div>

    <!-- 处理选项摘要 -->
    <div class="options-summary" id="optionsSummary"></div>

    <!-- 本地模式配置面板 -->
    <div class="local-config-panel" id="localConfigPanel">
      <div class="config-title" data-i18n="wmOptTitle">参数配置</div>
      <div class="opt-list">
        <label class="opt-item">
          <div class="opt-info">
            <span class="opt-name" data-i18n="wmTrimName">剪掉片尾</span>
            <span class="opt-desc" data-i18n="wmTrimDesc">自动剪除视频最后 2.5 秒的 Google 标志</span>
          </div>
          <div class="toggle">
            <input type="checkbox" id="localOptTrim" checked>
            <span class="slider"></span>
          </div>
        </label>
        <label class="opt-item">
          <div class="opt-info">
            <span class="opt-name" data-i18n="wmDelogoName">去除首帧水印</span>
            <span class="opt-desc" data-i18n="wmDelogoDesc">擦除画面右下角的文本水印区域</span>
          </div>
          <div class="toggle">
            <input type="checkbox" id="localOptDelogo" checked>
            <span class="slider"></span>
          </div>
        </label>
      </div>
      
      <div class="config-title" style="margin-top: 20px;" data-i18n="wmModeTitle">处理模式</div>
      <select class="select-mode" id="localFpsSelect" style="margin-bottom: 24px;">
        <option value="15" data-i18n="videoWmModeFast">极速模式 (15 FPS)</option>
        <option value="30" selected data-i18n="wmModeStandard">标准模式 (30 FPS)</option>
      </select>

      <button class="btn-big-pick" id="localPickBtn" data-i18n="wmPickBtnText">📁 选择本地视频文件并开始</button>
    </div>

    <!-- 警告横幅 -->
    <div class="warning-banner" id="warningBanner">
      <span class="warn-icon">⚠️</span>
      <span data-i18n="wmWarnKeepOpen">处理过程中请勿关闭此标签页。您可以切换回 NotebookLM 继续使用。</span>
    </div>

    <!-- 主状态卡片 -->
    <div class="status-card" id="statusCard">
      <div class="spinner" id="spinner"></div>
      <div class="status-icon hidden" id="statusIcon"></div>
      <div class="status-text" id="statusText">等待视频数据...</div>
      <div class="status-detail" id="statusDetail">正在从 NotebookLM 页面接收视频</div>
      <div class="progress-bar-outer hidden" id="progressOuter">
        <div class="progress-bar-inner" id="progressInner"></div>
      </div>
      <div class="progress-text hidden" id="progressText">0%</div>
    </div>

    <!-- 完成操作 -->
    <div class="done-actions hidden" id="doneActions">
      <button class="btn btn-secondary" onclick="window.close()">关闭页面</button>
    </div>

    <!-- 错误卡片 -->
    <div class="error-card" id="errorCard">
      <div class="status-icon">❌</div>
      <div class="status-text">处理失败</div>
      <div class="status-detail" id="errorMsg"></div>
      <div class="error-detail" id="errorDetail"></div>
      <div class="done-actions" style="display:flex; margin-top: 16px;">
        <button class="btn btn-secondary" onclick="window.close()">关闭页面</button>
      </div>
    </div>
  </div>

  <script src="processor.js"></script>
</body>
</html>
