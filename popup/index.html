<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NLM Enhancer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="popup-container">
    <!-- 头部 -->
    <header class="popup-header">
      <div class="logo-area">
        <span class="logo-icon">📓</span>
        <div>
          <h1>NLM Enhancer</h1>
          <span class="version">v1.6.3.1</span>
        </div>
      </div>
      <div class="lang-container">
        <select class="lang-select" id="langSelect">
          <option value="auto">Auto</option>
          <option value="zh_CN">简体中文</option>
          <option value="zh_TW">繁體中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="es">Español</option>
        </select>
      </div>
    </header>

    <!-- 工具箱 (移至顶部) -->
    <div class="settings-section tools-section">
      <h2 class="section-title" data-i18n="sectionTools"></h2>
      
      <div class="tool-card" id="tool-localRemoval">
        <div class="tool-icon">🎬</div>
        <div class="tool-body">
          <div class="tool-name" data-i18n="toolLocalRemoval"></div>
          <div class="tool-desc" data-i18n="toolLocalRemovalDesc"></div>
        </div>
        <button class="tool-btn" id="btn-openLocalRemoval">
          <span data-i18n="btnOpen"></span>
        </button>
      </div>
    </div>

    <!-- 功能开关区域 -->
    <div class="settings-section">
      <h2 class="section-title" data-i18n="sectionCoreFeatures"></h2>

      <div class="setting-item" id="setting-quoteReply">
        <div class="setting-info">
          <span class="setting-icon">💬</span>
          <div>
            <div class="setting-name" data-i18n="featureQuoteReply"></div>
            <div class="setting-desc" data-i18n="featureQuoteReplyDesc"></div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-key="quoteReplyEnabled">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="setting-item" id="setting-formulaCopy">
        <div class="setting-info">
          <span class="setting-icon">📐</span>
          <div>
            <div class="setting-name" data-i18n="featureFormulaCopy"></div>
            <div class="setting-desc" data-i18n="featureFormulaCopyDesc"></div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-key="formulaCopyEnabled">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- 公式格式选择 -->
      <div class="sub-setting" id="formula-format-group">
        <div class="setting-name-small" data-i18n="formulaCopyFormat"></div>
        <div class="radio-group" id="formulaFormatGroup">
          <label class="radio-option">
            <input type="radio" name="formulaFormat" value="latex">
            <span data-i18n="formatLatexRecommended"></span>
          </label>
          <label class="radio-option">
            <input type="radio" name="formulaFormat" value="mathml">
            <span data-i18n="formatMathmlExperimental"></span>
          </label>
          <label class="radio-option">
            <input type="radio" name="formulaFormat" value="no-dollar">
            <span data-i18n="formatPlainText"></span>
          </label>
          <label class="radio-option">
            <input type="radio" name="formulaFormat" value="notion">
            <span data-i18n="formatNotion"></span>
          </label>
        </div>
      </div>

      <div class="setting-item" id="setting-timeline">
        <div class="setting-info">
          <span class="setting-icon">🔘</span>
          <div>
            <div class="setting-name" data-i18n="featureTimeline"></div>
            <div class="setting-desc" data-i18n="featureTimelineDesc"></div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-key="timelineEnabled">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="setting-item" id="setting-export">
        <div class="setting-info">
          <span class="setting-icon">📥</span>
          <div>
            <div class="setting-name" data-i18n="featureExport"></div>
            <div class="setting-desc" data-i18n="featureExportDesc"></div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-key="exportEnabled">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="setting-item" id="setting-stashCart">
        <div class="setting-info">
          <span class="setting-icon">🛒</span>
          <div>
            <div class="setting-name" data-i18n="featureStashCart"></div>
            <div class="setting-desc" data-i18n="featureStashCartDesc"></div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-key="stashCartEnabled">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="setting-item" id="setting-prompt">
        <div class="setting-info">
          <span class="setting-icon">⚡</span>
          <div>
            <div class="setting-name" data-i18n="featurePromptVault"></div>
            <div class="setting-desc" data-i18n="featurePromptVaultDesc"></div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-key="promptVaultEnabled">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="setting-item" id="setting-questionHistory">
        <div class="setting-info">
          <span class="setting-icon">🕒</span>
          <div>
            <div class="setting-name" data-i18n="featureQuestionHistory"></div>
            <div class="setting-desc" data-i18n="featureQuestionHistoryDesc"></div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-key="questionHistoryEnabled">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="setting-item" id="setting-videoWatermark">
        <div class="setting-info">
          <span class="setting-icon">🎬</span>
          <div>
            <div class="setting-name" data-i18n="featureVideoWatermark"></div>
            <div class="setting-desc" data-i18n="featureVideoWatermarkDesc"></div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-key="videoWatermarkEnabled">
          <span class="toggle-slider"></span>
        </label>
      </div>

    </div>

    <div class="settings-section">
      <h2 class="section-title" data-i18n="sectionInputExperience"></h2>

      <div class="setting-item" id="setting-draft">
        <div class="setting-info">
          <span class="setting-icon">💾</span>
          <div>
            <div class="setting-name" data-i18n="featureDraftSave"></div>
            <div class="setting-desc" data-i18n="featureDraftSaveDesc"></div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-key="draftSaveEnabled">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="setting-item" id="setting-send">
        <div class="setting-info">
          <span class="setting-icon">⌨️</span>
          <div>
            <div class="setting-name" data-i18n="featureCtrlEnterSend"></div>
            <div class="setting-desc" data-i18n="featureCtrlEnterSendDesc"></div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-key="ctrlEnterSend">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="setting-item" id="setting-scroll">
        <div class="setting-info">
          <span class="setting-icon">🔒</span>
          <div>
            <div class="setting-name" data-i18n="featurePreventScroll"></div>
            <div class="setting-desc" data-i18n="featurePreventScrollDesc"></div>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" data-key="preventScrollEnabled">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>




    <!-- 底部 -->
    <footer class="popup-footer">
      <span>Made with ❤️ for NotebookLM</span>
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
